<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon Bank - Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body onload="updateNavigation()">
<header>
    <div class="logo">Horizon Bank</div>
    <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>

    <a href="account.html" id="accountLink">Account</a>

    <a href="transactions.html" id="transactionLink">Transactions</a>

    <a href="contact.html">Contact</a>

    <a href="login.html" class="login-btn" id="loginLink">Login</a>

    <a href="#" class="login-btn" id="logoutLink" onclick="logout()">Logout</a>
</nav>
</header>
<section class="login-section">
<div class="login-box">
    <h2>Welcome Back</h2>
    <p>Login to your Horizon Bank Account</p>
    <input type="text" id="customerid" placeholder="Customer ID">
    <div class="password-box">
    <input type="password" id="password" placeholder="Enter Password">
    <img src="securebank/images/Untitled_design-removebg-preview.png" id="eyeIcon" onclick="togglePassword()">
</div>
    <p id="error" style="color:red; margin-bottom:15px;"></p>
    <button onclick="login()">Login</button>
<div class="login-links">
<a href="#">Forgot Password?</a>
</div>
</div>
</section>
<footer>
<p>Horizon Bank. All Rights Reserved.</p>
</footer>
<script src="script.js"></script>
</body>
</html>
